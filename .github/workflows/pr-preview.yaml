---
name: PR Preview

# yamllint disable-line rule:truthy
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

env:
  DEFAULT_NODE: 24
  ARTIFACT_NAME: netlink-ha-cards-pr-${{ github.event.pull_request.number }}

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build preview artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🏗 Set up Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: 🏗 Install dependencies
        run: npm ci
      - name: 🚀 Build preview bundle
        run: npm run build
      - name: 📦 Archive preview bundle
        run: cd dist && zip -r ../netlink-ha-cards.zip .
      - name: ⬆️ Upload preview artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            dist/netlink-ha-cards.js
            netlink-ha-cards.zip
          retention-days: 14

  comment:
    name: Comment preview instructions
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
    steps:
      - name: 💬 Upsert PR preview comment
        uses: actions/github-script@v8.0.0
        env:
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        with:
          script: |
            const marker = '<!-- pr-preview-build -->';
            const artifactName = process.env.ARTIFACT_NAME;
            const { owner, repo } = context.repo;
            const issueNumber = context.issue.number;
            const runId = context.runId;
            const repositoryUrl = context.payload.repository.html_url;
            const runUrl = `${repositoryUrl}/actions/runs/${runId}`;

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
            });

            const artifact = artifacts.find((item) => item.name === artifactName);
            const artifactUrl = artifact ? `${runUrl}/artifacts/${artifact.id}` : runUrl;
            const shortSha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              marker,
              '## 🎉 Preview build ready!',
              '',
              `Built from \`${shortSha}\`.`,
              '',
              `- [Download preview build](${artifactUrl})`,
              '',
              '### 📝 Installation instructions',
              '1. Download the artifact from the workflow run.',
              '2. Extract `netlink-ha-cards.zip` or use `dist/netlink-ha-cards.js` directly, then replace the file in `config/www`.',
              '3. Reload the `/local/netlink-ha-cards.js` resource in Home Assistant.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
            });

            const existingComment = comments.find((comment) => comment.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });
